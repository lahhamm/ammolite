[build]
  publish = "."
  functions = "netlify/functions"

# CSP intentionally omitted here: the site loads scripts from three CDN origins
# (jsdelivr, cdnjs, unpkg) and relies on inline <script>/<style> on every page,
# so a correct policy needs per-page testing before it ships. Add it as a
# deliberate follow-up rather than risk silently breaking a hero animation.
[[headers]]
  for = "/*"
  [headers.values]
    # SAMEORIGIN, not DENY: /work embeds /ironvein, /meridian and /lumen in
    # their own iframes as live preview cards. DENY blocks all framing,
    # including this same-site case. SAMEORIGIN still blocks third-party
    # clickjacking (the actual threat this header exists for) while allowing
    # the site to embed its own pages.
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
